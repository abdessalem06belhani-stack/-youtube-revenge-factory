name: YouTube Revenge Factory Pipeline

on:
  workflow_dispatch:
    inputs:
      source_video:
        description: 'Source video ID from Supabase'
        required: true
        default: ''
      level:
        description: 'CEFR level (A1, A2, B1, B2, C1)'
        required: true
        default: 'B1'
      count:
        description: 'Number of videos to generate'
        required: true
        default: '4'
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours

env:
  PYTHON_VERSION: '3.11'
  PIP_CACHE_DIR: ${{ github.workspace }}/.cache/pip
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
  YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
  YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
  NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
  UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
  UNSPLASH_SECRET_KEY: ${{ secrets.UNSPLASH_SECRET_KEY }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 480  # 8 hours for full pipeline
    strategy:
      matrix:
        video_index: [1, 2, 3, 4]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Setup pip cache
        uses: actions/cache@v4
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up environment
        run: |
          echo "PYTHONPATH=${{ github.workspace }}" >> $GITHUB_ENV
          echo "WORKFLOW_ID=${{ github.run_id }}" >> $GITHUB_ENV
          echo "VIDEO_INDEX=${{ matrix.video_index }}" >> $GITHUB_ENV
          mkdir -p outputs

      - name: Initialize pipeline
        run: |
          python -c "
          import json, os
          from datetime import datetime
          pipeline_data = {
              'run_id': '${{ github.run_id }}',
              'video_index': ${{ matrix.video_index }},
              'source_video': '${{ github.event.inputs.source_video }}',
              'level': '${{ github.event.inputs.level }}',
              'count': ${{ github.event.inputs.count }},
              'triggered_by': '${{ github.event_name }}',
              'timestamp': datetime.utcnow().isoformat(),
              'status': 'initialized',
              'artifacts': {}
          }
          os.makedirs('outputs', exist_ok=True)
          with open('outputs/pipeline_state.json', 'w') as f:
              json.dump(pipeline_data, f, indent=2)
          print(f'Pipeline initialized')
          "

      - name: Step 1 — Scrape trending videos
        run: |
          python -m src.main scrape \
            --output outputs/step1_scraped_data.json \
            --source "${{ github.event.inputs.source_video }}"

      - name: Step 1.5 — Extract story from video
        run: |
          python -c "
          import json
          with open('outputs/step1_scraped_data.json') as f:
              data = json.load(f)
          videos = data.get('videos', [])
          if videos:
              story = {
                  'transcript': videos[0].get('description', ''),
                  'original_title': videos[0].get('title', ''),
                  'hashtags': videos[0].get('tags', []),
              }
              with open('outputs/step1_extracted_story.json', 'w') as out:
                  json.dump(story, out, indent=2)
              print(f'Extracted story from video: {videos[0].get(\"title\", \"unknown\")}')
          else:
              # Create a placeholder story
              story = {
                  'transcript': 'A person faced an unexpected betrayal and decided to take action.',
                  'original_title': 'YouTube Revenge Story',
                  'hashtags': ['revenge', 'storytime', 'karma'],
              }
              with open('outputs/step1_extracted_story.json', 'w') as out:
                  json.dump(story, out, indent=2)
              print('No videos found — using placeholder story')
          "

      - name: Step 2 — Rewrite story
        run: |
          python -m src.main rewrite \
            --input outputs/step1_extracted_story.json \
            --output outputs/step2_rewritten_story.json \
            --duration 50

      - name: Step 3 — Generate TTS
        run: |
          python -m src.main tts \
            --input outputs/step2_rewritten_story.json \
            --output outputs/audio

      - name: Step 4 — Match backgrounds
        run: |
          python -m src.main backgrounds \
            --input outputs/step2_rewritten_story.json \
            --output outputs/step4_backgrounds

      - name: Step 5 — Generate thumbnail
        run: |
          python -m src.main thumbnail \
            --input outputs/step2_rewritten_story.json \
            --output outputs/step5_thumbnail.png \
            --style modern

      - name: Step 6 — Trigger Colab rendering (optional)
        run: |
          if [ -n "${{ secrets.COLAB_WEBHOOK_URL }}" ]; then
            curl -X POST "${{ secrets.COLAB_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d '{
                "story": "outputs/step2_rewritten_story.json",
                "audio": "outputs/audio",
                "backgrounds": "outputs/step4_backgrounds",
                "thumbnail": "outputs/step5_thumbnail.png",
                "resolution": "4k",
                "run_id": "${{ github.run_id }}",
                "video_index": ${{ matrix.video_index }}
              }'
          else
            echo "No Colab webhook configured — skipping 4K rendering"
          fi

      - name: Step 7 — Upload to YouTube
        run: |
          if [ -f outputs/step6_rendered_video ]; then
            python -m src.main upload \
              --video outputs/step6_rendered_video \
              --story outputs/step2_rewritten_story.json \
              --title "YouTube Revenge Story — Run ${{ github.run_id }} Video ${{ matrix.video_index }}" \
              --description "Generated by YouTube Revenge Story Factory. Run: ${{ github.run_id }}, Video: ${{ matrix.video_index }}"
          else
            echo "No rendered video found — upload skipped (Colab rendering may not be configured)"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-artifacts-${{ github.run_id }}-video-${{ matrix.video_index }}
          path: outputs/
          retention-days: 30

      - name: Notify Dashboard via Supabase
        run: |
          python -c "
          import requests, json, os
          from datetime import datetime
          supabase_url = os.environ.get('SUPABASE_URL', '')
          supabase_key = os.environ.get('SUPABASE_KEY', '')
          if not supabase_url or not supabase_key:
              print('Supabase URL or key missing — skipping notification')
          else:
              data = {
                  'run_id': '${{ github.run_id }}',
                  'video_index': ${{ matrix.video_index }},
                  'status': 'completed',
                  'timestamp': datetime.utcnow().isoformat(),
                  'workflow_url': '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
              }
              try:
                  r = requests.post(
                      f'{supabase_url}/rest/v1/pipeline_runs',
                      headers={
                          'Authorization': f'Bearer {supabase_key}',
                          'Content-Type': 'application/json',
                          'Prefer': 'return=representation'
                      },
                      json=data
                  )
                  if r.status_code in (200, 201):
                      print(f'Dashboard notified: {r.json()}')
                  else:
                      print(f'Dashboard notification failed: {r.status_code} — {r.text}')
              except Exception as e:
                  print(f'Dashboard notification error: {e}')
          "

      - name: Cleanup
        if: always()
        run: |
          rm -rf outputs/step*_temp outputs/tmp_* 2>/dev/null || true
          echo "Cleanup completed"

      - name: Final status
        run: |
          echo "== Pipeline completed =="
          echo "Run ID: ${{ github.run_id }}"
          echo "Video Index: ${{ matrix.video_index }}"
          echo "Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
